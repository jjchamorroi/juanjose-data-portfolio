<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 690" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#5b6b7b"/>
    </marker>
    <style>
      .lbl{font-size:12.5px;fill:#1f2d3d;} .lblb{font-size:12.5px;font-weight:700;fill:#1f2d3d;}
      .sub{font-size:10px;fill:#5b6b7b;} .title{font-size:16px;font-weight:700;fill:#1f2d3d;}
      .phase{font-size:11.5px;font-weight:700;} .flow{stroke:#5b6b7b;stroke-width:1.6;fill:none;marker-end:url(#arrow);}
      .route{stroke:#8a5a00;stroke-width:1.4;fill:none;marker-end:url(#arrow);stroke-dasharray:4 3;}
      .dash{stroke:#9aa7b4;stroke-width:1.3;fill:none;stroke-dasharray:4 3;marker-end:url(#arrow);}
    </style>
  </defs>
  <rect width="1000" height="690" fill="#ffffff"/>
  <text x="30" y="28" class="title">Agentic analytics over the data warehouse (Snowflake Cortex)</text>
  <text x="30" y="48" class="sub">NL chat → agent routing → text-to-SQL + semantic search + tool servers · grounded on governed data</text>

  <!-- client tier -->
  <rect x="40" y="72" width="150" height="54" rx="9" fill="#e9f6f8" stroke="#3a9bad"/>
  <text x="115" y="94" text-anchor="middle" class="lblb">SPA chat UI</text>
  <text x="115" y="110" text-anchor="middle" class="sub">Vite · charts + chips</text>

  <rect x="255" y="72" width="185" height="54" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="347" y="94" text-anchor="middle" class="lblb">FastAPI orchestration</text>
  <text x="347" y="110" text-anchor="middle" class="sub">1 endpoint · typed `parts`</text>

  <rect x="505" y="72" width="200" height="54" rx="9" fill="#efeafd" stroke="#7a5fc0"/>
  <text x="605" y="94" text-anchor="middle" class="lblb">Cortex Agent (LLM)</text>
  <text x="605" y="110" text-anchor="middle" class="sub">routing · cites sources</text>

  <path class="flow" d="M190,90 L253,90"/>
  <path class="flow" d="M253,108 L192,108"/>
  <path class="flow" d="M440,97 L503,97"/>
  <text x="472" y="90" text-anchor="middle" class="sub">:run</text>

  <!-- orchestration sub-tier (under FastAPI, no crossing) -->
  <rect x="230" y="150" width="130" height="46" rx="9" fill="#fff4e6" stroke="#d59433"/>
  <text x="295" y="169" text-anchor="middle" class="lbl">Keycloak</text>
  <text x="295" y="184" text-anchor="middle" class="sub">SPA auth · user scope</text>
  <rect x="378" y="150" width="150" height="46" rx="9" fill="#f3f0fa" stroke="#8267c4"/>
  <text x="453" y="169" text-anchor="middle" class="lbl">PostgreSQL</text>
  <text x="453" y="184" text-anchor="middle" class="sub">threads + messages</text>
  <path class="flow" d="M320,126 L300,148"/>
  <path class="flow" d="M375,126 L430,148"/>
  <text x="548" y="176" class="sub" fill="#5b6b7b">persist user message first,</text>
  <text x="548" y="190" class="sub" fill="#5b6b7b">then call the warehouse (retry UX)</text>

  <!-- Snowflake box -->
  <rect x="40" y="220" width="920" height="440" rx="12" fill="#f7f9fc" stroke="#b8c2cc" stroke-dasharray="6 4"/>
  <text x="56" y="243" class="phase" fill="#5b6b7b">SNOWFLAKE — governed data + AI (no data leaves the warehouse)</text>
  <text x="605" y="267" text-anchor="middle" class="sub" fill="#8a5a00">routing rules by question type ↓</text>

  <!-- 4 tools row -->
  <rect x="70"  y="284" width="200" height="56" rx="9" fill="#fff4e6" stroke="#d59433"/>
  <text x="170" y="306" text-anchor="middle" class="lblb">Cortex Analyst</text>
  <text x="170" y="323" text-anchor="middle" class="sub">text-to-SQL (quantitative)</text>
  <rect x="290" y="284" width="200" height="56" rx="9" fill="#fff4e6" stroke="#d59433"/>
  <text x="390" y="306" text-anchor="middle" class="lblb">Cortex Search</text>
  <text x="390" y="323" text-anchor="middle" class="sub">semantic / vector search</text>
  <rect x="510" y="284" width="200" height="56" rx="9" fill="#fff4e6" stroke="#d59433"/>
  <text x="610" y="306" text-anchor="middle" class="lblb">MCP tool servers</text>
  <text x="610" y="323" text-anchor="middle" class="sub">relationships · entity detail</text>
  <rect x="730" y="284" width="200" height="56" rx="9" fill="#fdeef0" stroke="#c05364"/>
  <text x="830" y="306" text-anchor="middle" class="lblb">Action: stored proc</text>
  <text x="830" y="323" text-anchor="middle" class="sub">email report (on request)</text>

  <path class="route" d="M580,126 C420,200 250,250 175,282"/>
  <path class="route" d="M595,126 C500,210 420,255 390,282"/>
  <path class="route" d="M615,126 C640,210 620,255 610,282"/>
  <path class="route" d="M630,126 C760,200 810,250 830,282"/>

  <!-- data layer row -->
  <rect x="70"  y="380" width="200" height="54" rx="9" fill="#eafaf1" stroke="#3ba368"/>
  <text x="170" y="402" text-anchor="middle" class="lblb">Semantic Views</text>
  <text x="170" y="419" text-anchor="middle" class="sub">friendly names + calcs</text>
  <rect x="290" y="380" width="200" height="54" rx="9" fill="#f3f0fa" stroke="#8267c4"/>
  <text x="390" y="402" text-anchor="middle" class="lblb">Embeddings index</text>
  <text x="390" y="419" text-anchor="middle" class="sub">from documents</text>
  <rect x="510" y="380" width="200" height="54" rx="9" fill="#eef2f7" stroke="#7d8da0"/>
  <text x="610" y="402" text-anchor="middle" class="lbl">Domain lookups</text>
  <text x="610" y="419" text-anchor="middle" class="sub">served by MCP</text>
  <rect x="730" y="380" width="200" height="54" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="830" y="402" text-anchor="middle" class="lbl">Virtual warehouse</text>
  <text x="830" y="419" text-anchor="middle" class="sub">shared compute · timeouts</text>
  <path class="flow" d="M170,340 L170,378"/>
  <path class="flow" d="M390,340 L390,378"/>
  <path class="flow" d="M610,340 L610,378"/>
  <path class="dash" d="M830,340 L830,378"/>

  <!-- base data row -->
  <rect x="70"  y="470" width="200" height="54" rx="9" fill="#eef2f7" stroke="#7d8da0"/>
  <text x="170" y="492" text-anchor="middle" class="lbl">Base tables · Dynamic Tables</text>
  <text x="170" y="509" text-anchor="middle" class="sub">governed source · incremental</text>
  <rect x="290" y="470" width="200" height="54" rx="9" fill="#eef2f7" stroke="#7d8da0"/>
  <text x="390" y="492" text-anchor="middle" class="lbl">Documents (PDF/text)</text>
  <text x="390" y="509" text-anchor="middle" class="sub">source for embeddings</text>
  <path class="flow" d="M170,434 L170,468"/>
  <path class="flow" d="M390,434 L390,468"/>

  <text x="500" y="566" text-anchor="middle" class="sub" fill="#5b6b7b">Governance boundary: quantitative answers resolve through Semantic Views (no raw columns); "find/where" answers through the embeddings index — both citable.</text>
  <text x="500" y="590" text-anchor="middle" class="sub" fill="#5b6b7b">Cross-reference keys let the agent join content (search) with metrics (SQL) in a single answer.</text>
  <text x="500" y="614" text-anchor="middle" class="sub" fill="#5b6b7b">Response parts (text · Vega-Lite chart · suggested queries) are normalized by FastAPI and rendered by the SPA.</text>
  <text x="500" y="638" text-anchor="middle" class="sub" fill="#5f47a8">Tables fed continuously by the event-driven pipeline in Case 01 (Snowpipe → Stream → Task).</text>
</svg>
