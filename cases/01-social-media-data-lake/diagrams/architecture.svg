<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#5b6b7b"/>
    </marker>
    <style>
      .lbl{font-size:13px;fill:#1f2d3d;} .lblb{font-size:13px;font-weight:700;fill:#1f2d3d;}
      .sub{font-size:10.5px;fill:#5b6b7b;} .title{font-size:16px;font-weight:700;fill:#1f2d3d;}
      .phase{font-size:12px;font-weight:700;} .flow{stroke:#5b6b7b;stroke-width:1.6;fill:none;marker-end:url(#arrow);}
      .split{stroke:#3ba368;stroke-width:1.6;fill:none;marker-end:url(#arrow);}
      .join{stroke:#c05364;stroke-width:1.6;fill:none;marker-end:url(#arrow);}
    </style>
  </defs>
  <rect width="1000" height="720" fill="#ffffff"/>
  <text x="30" y="32" class="title">Social media data lake — serverless medallion on AWS</text>
  <text x="30" y="52" class="sub">Daily batch · fan-out to 6 parallel jobs · fan-in · sequential LLM stage · SQL on CURATED only</text>

  <!-- trigger + orchestrator -->
  <rect x="30" y="72" width="160" height="50" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="110" y="93" text-anchor="middle" class="lblb">EventBridge</text>
  <text x="110" y="110" text-anchor="middle" class="sub">daily cron (early AM)</text>
  <rect x="220" y="72" width="190" height="50" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="315" y="93" text-anchor="middle" class="lblb">Step Functions</text>
  <text x="315" y="110" text-anchor="middle" class="sub">state machine / orchestration</text>
  <path class="flow" d="M190,97 L218,97"/>

  <!-- PHASE 1 container -->
  <rect x="30" y="150" width="600" height="300" rx="12" fill="#f6fbf7" stroke="#3ba368" stroke-dasharray="6 4"/>
  <text x="46" y="172" class="phase" fill="#2f8556">PHASE 1 · PARALLEL — Map state fans out to 6 AWS Glue jobs</text>

  <!-- split node -->
  <circle cx="120" cy="215" r="16" fill="#eafaf1" stroke="#3ba368"/>
  <text x="120" y="219" text-anchor="middle" class="lblb" font-size="14">⑃</text>
  <text x="120" y="248" text-anchor="middle" class="sub">fan-out</text>
  <path class="flow" d="M315,122 L315,150 M120,150 L120,197" />
  <path class="flow" d="M315,150 C200,150 160,175 133,205"/>

  <!-- 6 job boxes -->
  <g>
    <rect x="175" y="185" width="130" height="38" rx="8" fill="#eafaf1" stroke="#3ba368"/><text x="240" y="209" text-anchor="middle" class="lbl">Facebook</text>
    <rect x="320" y="185" width="130" height="38" rx="8" fill="#eafaf1" stroke="#3ba368"/><text x="385" y="209" text-anchor="middle" class="lbl">Instagram</text>
    <rect x="465" y="185" width="130" height="38" rx="8" fill="#eafaf1" stroke="#3ba368"/><text x="530" y="209" text-anchor="middle" class="lbl">TikTok</text>
    <rect x="175" y="233" width="130" height="38" rx="8" fill="#eafaf1" stroke="#3ba368"/><text x="240" y="257" text-anchor="middle" class="lbl">X (Twitter)</text>
    <rect x="320" y="233" width="130" height="38" rx="8" fill="#eafaf1" stroke="#3ba368"/><text x="385" y="257" text-anchor="middle" class="lbl">YouTube</text>
    <rect x="465" y="233" width="130" height="38" rx="8" fill="#eafaf1" stroke="#3ba368"/><text x="530" y="257" text-anchor="middle" class="lbl">Comments</text>
  </g>
  <path class="split" d="M136,213 L173,204"/><path class="split" d="M136,216 L318,204"/><path class="split" d="M136,218 L463,204"/>
  <path class="split" d="M136,221 L173,252"/><path class="split" d="M136,224 L318,252"/><path class="split" d="M136,226 L463,252"/>

  <!-- RAW and CURATED inside phase 1 -->
  <rect x="90" y="300" width="230" height="56" rx="9" fill="#f3f0fa" stroke="#8267c4"/>
  <text x="205" y="323" text-anchor="middle" class="lblb">RAW layer (S3)</text>
  <text x="205" y="341" text-anchor="middle" class="sub">raw JSONL · history · append-only</text>
  <rect x="350" y="300" width="260" height="56" rx="9" fill="#f3f0fa" stroke="#8267c4"/>
  <text x="480" y="319" text-anchor="middle" class="lblb">CURATED — Apache Iceberg</text>
  <text x="480" y="337" text-anchor="middle" class="sub">auto-aligned schema · versioned · MERGE</text>
  <path class="flow" d="M320,328 L348,328"/>
  <path class="flow" d="M385,271 L385,298" /><path class="flow" d="M240,271 L215,298"/>

  <!-- join node -->
  <circle cx="480" cy="400" r="16" fill="#fbe3e7" stroke="#c05364"/>
  <text x="480" y="405" text-anchor="middle" class="lblb" font-size="14">⑂</text>
  <text x="480" y="430" text-anchor="middle" class="sub">fan-in (wait all)</text>
  <path class="flow" d="M480,356 L480,383"/>

  <!-- PHASE 2 -->
  <rect x="670" y="150" width="300" height="300" rx="12" fill="#fdeef0" stroke="#c05364" stroke-dasharray="6 4"/>
  <text x="686" y="172" class="phase" fill="#a23a4a">PHASE 2 · SEQUENTIAL — runs only after all 6 finish</text>
  <rect x="720" y="250" width="200" height="70" rx="9" fill="#fbe3e7" stroke="#c05364"/>
  <text x="820" y="278" text-anchor="middle" class="lblb">Sentiment analysis</text>
  <text x="820" y="297" text-anchor="middle" class="sub">LLM over comments · rate-limited</text>
  <path class="join" d="M496,398 C620,392 660,320 718,300"/>
  <path class="flow" d="M820,320 C820,360 640,380 496,400"/>

  <!-- catalog + athena -->
  <rect x="350" y="480" width="260" height="52" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="480" y="502" text-anchor="middle" class="lblb">Glue Data Catalog</text>
  <text x="480" y="519" text-anchor="middle" class="sub">Iceberg table registry</text>
  <path class="flow" d="M480,416 L480,478"/>
  <rect x="350" y="560" width="260" height="58" rx="9" fill="#e9f6f8" stroke="#3a9bad"/>
  <text x="480" y="583" text-anchor="middle" class="lblb">Amazon Athena — SQL</text>
  <text x="480" y="601" text-anchor="middle" class="sub">queries CURATED only · BI / dashboards</text>
  <path class="flow" d="M480,532 L480,558"/>

  <!-- IaC -->
  <rect x="670" y="480" width="300" height="138" rx="12" fill="#f6f8fa" stroke="#b8c2cc"/>
  <text x="820" y="504" text-anchor="middle" class="phase" fill="#5b6b7b">INFRASTRUCTURE AS CODE</text>
  <text x="820" y="528" text-anchor="middle" class="sub">Terraform · reusable modules</text>
  <text x="820" y="548" text-anchor="middle" class="sub">glue · iam · s3 · eventbridge+stepfunction</text>
  <text x="820" y="574" text-anchor="middle" class="sub">environments: sandbox / QA / prod</text>
  <text x="820" y="600" text-anchor="middle" class="sub">one `terraform apply` per environment</text>
  <!-- SNS failure notifications -->
  <marker id="rednote" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 z" fill="#c05364"/></marker>
  <rect x="700" y="58" width="250" height="48" rx="9" fill="#fdeef0" stroke="#c05364"/>
  <text x="825" y="79" text-anchor="middle" class="lblb">SNS — failure alerts</text>
  <text x="825" y="96" text-anchor="middle" class="sub">each state: Catch (States.ALL) → publish</text>
  <path d="M600,150 C640,120 680,110 715,104" fill="none" stroke="#c05364" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rednote)"/>
  <path d="M880,250 C905,190 880,135 858,108" fill="none" stroke="#c05364" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rednote)"/>
  <text x="660" y="120" text-anchor="middle" class="sub" fill="#c05364">on failure</text>
</svg>
