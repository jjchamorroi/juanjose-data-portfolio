<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#5b6b7b"/>
    </marker>
    <style>
      .lbl{font-size:12.5px;fill:#1f2d3d;} .lblb{font-size:12.5px;font-weight:700;fill:#1f2d3d;}
      .sub{font-size:10px;fill:#5b6b7b;} .title{font-size:16px;font-weight:700;fill:#1f2d3d;}
      .phase{font-size:11.5px;font-weight:700;} .flow{stroke:#5b6b7b;stroke-width:1.6;fill:none;marker-end:url(#arrow);}
      .dash{stroke:#9aa7b4;stroke-width:1.3;fill:none;stroke-dasharray:4 3;marker-end:url(#arrow);}
    </style>
  </defs>
  <rect width="1000" height="660" fill="#ffffff"/>
  <text x="30" y="30" class="title">Cloud platform (Terraform) — ECS Fargate + shared ALB + CloudFront</text>
  <text x="30" y="50" class="sub">One reusable blueprint · per-environment tfvars (sandbox / QA / prod) · proven at national scale</text>

  <!-- top edge flow (spread out) -->
  <rect x="30" y="96" width="120" height="54" rx="9" fill="#e9f6f8" stroke="#3a9bad"/>
  <text x="90" y="127" text-anchor="middle" class="lblb">Users</text>

  <rect x="190" y="96" width="130" height="54" rx="9" fill="#fdeef0" stroke="#c05364"/>
  <text x="255" y="118" text-anchor="middle" class="lblb">WAF</text>
  <text x="255" y="134" text-anchor="middle" class="sub">edge protection</text>

  <rect x="360" y="96" width="160" height="54" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="440" y="118" text-anchor="middle" class="lblb">CloudFront</text>
  <text x="440" y="134" text-anchor="middle" class="sub">CDN · TLS (ACM) · Route 53</text>

  <path class="flow" d="M150,123 L188,123"/>
  <path class="flow" d="M320,123 L358,123"/>

  <!-- branches -->
  <rect x="580" y="60" width="200" height="52" rx="9" fill="#f3f0fa" stroke="#8267c4"/>
  <text x="680" y="81" text-anchor="middle" class="lblb">S3 — static SPA</text>
  <text x="680" y="97" text-anchor="middle" class="sub">private origin (OAC)</text>
  <path class="flow" d="M520,110 L578,88"/>
  <text x="548" y="82" class="sub">assets</text>

  <rect x="580" y="140" width="200" height="54" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="680" y="162" text-anchor="middle" class="lblb">Shared ALB</text>
  <text x="680" y="178" text-anchor="middle" class="sub">host/path rules → target groups</text>
  <path class="flow" d="M520,136 L578,160"/>
  <text x="545" y="158" class="sub">/api/*</text>

  <!-- VPC -->
  <rect x="30" y="234" width="700" height="392" rx="12" fill="#f7f9fc" stroke="#b8c2cc" stroke-dasharray="6 4"/>
  <text x="46" y="257" class="phase" fill="#5b6b7b">VPC — private subnets (no public IPs)</text>
  <text x="46" y="274" class="sub" fill="#5b6b7b">Persistence is the one swappable module: RDS ↔ DocumentDB</text>

  <!-- col 1 -->
  <rect x="55" y="292" width="200" height="58" rx="9" fill="#eafaf1" stroke="#3ba368"/>
  <text x="155" y="315" text-anchor="middle" class="lblb">ECS Fargate — API</text>
  <text x="155" y="332" text-anchor="middle" class="sub">autoscaled tasks</text>
  <rect x="55" y="366" width="200" height="52" rx="9" fill="#eafaf1" stroke="#3ba368" stroke-dasharray="3 2"/>
  <text x="155" y="387" text-anchor="middle" class="lbl">ECS — additional service</text>
  <text x="155" y="403" text-anchor="middle" class="sub">SSR / worker (same ALB)</text>
  <rect x="55" y="434" width="200" height="52" rx="9" fill="#eef4ff" stroke="#4a7bd4"/>
  <text x="155" y="455" text-anchor="middle" class="lbl">Keycloak (OIDC)</text>
  <text x="155" y="471" text-anchor="middle" class="sub">JWT · JWKS validation</text>

  <!-- col 2 -->
  <rect x="280" y="292" width="185" height="58" rx="9" fill="#eef2f7" stroke="#7d8da0"/>
  <text x="372" y="313" text-anchor="middle" class="lbl">RDS PostgreSQL</text>
  <text x="372" y="330" text-anchor="middle" class="sub">App A · transactional (ACID)</text>
  <rect x="280" y="366" width="185" height="52" rx="9" fill="#fff4e6" stroke="#d59433"/>
  <text x="372" y="387" text-anchor="middle" class="lbl">Secrets Manager</text>
  <text x="372" y="403" text-anchor="middle" class="sub">config injected</text>
  <rect x="280" y="434" width="185" height="52" rx="9" fill="#eef2f7" stroke="#7d8da0"/>
  <text x="372" y="455" text-anchor="middle" class="lbl">S3 media</text>
  <text x="372" y="471" text-anchor="middle" class="sub">presigned URLs</text>

  <!-- col 3 -->
  <rect x="490" y="292" width="215" height="58" rx="9" fill="#eef2f7" stroke="#7d8da0"/>
  <text x="597" y="313" text-anchor="middle" class="lbl">DocumentDB</text>
  <text x="597" y="330" text-anchor="middle" class="sub">App B · event scale</text>
  <rect x="490" y="366" width="215" height="52" rx="9" fill="#fff4e6" stroke="#d59433"/>
  <text x="597" y="387" text-anchor="middle" class="lbl">ECR</text>
  <text x="597" y="403" text-anchor="middle" class="sub">container images</text>
  <rect x="490" y="434" width="215" height="52" rx="9" fill="#eef2f7" stroke="#7d8da0"/>
  <text x="597" y="455" text-anchor="middle" class="lbl">SES</text>
  <text x="597" y="471" text-anchor="middle" class="sub">transactional email</text>

  <!-- ALB into ECS -->
  <path class="flow" d="M655,194 C560,230 320,255 175,290"/>
  <!-- ECS to stores -->
  <path class="flow" d="M255,318 L278,318"/>
  <path class="dash" d="M255,330 C400,352 470,325 490,320"/>
  <path class="dash" d="M255,340 C300,360 320,364 330,366"/>
  <path class="dash" d="M255,352 C400,410 490,430 490,440"/>
  <path class="dash" d="M255,400 C300,420 330,432 372,434"/>

  <!-- IaC panel -->
  <rect x="752" y="234" width="218" height="392" rx="12" fill="#f6f8fa" stroke="#b8c2cc"/>
  <text x="861" y="258" text-anchor="middle" class="phase" fill="#5b6b7b">TERRAFORM (IaC)</text>
  <text x="861" y="288" text-anchor="middle" class="sub">modules:</text>
  <text x="861" y="308" text-anchor="middle" class="sub">vpc · ecr · secrets</text>
  <text x="861" y="326" text-anchor="middle" class="sub">frontend (S3+CloudFront)</text>
  <text x="861" y="344" text-anchor="middle" class="sub">public_alb</text>
  <text x="861" y="362" text-anchor="middle" class="sub">ecs_backend · ecs_additional</text>
  <text x="861" y="380" text-anchor="middle" class="sub">rds · documentdb</text>
  <text x="861" y="398" text-anchor="middle" class="sub">dns · waf · bastion_ssm</text>
  <text x="861" y="428" text-anchor="middle" class="sub">names = project_name</text>
  <text x="861" y="445" text-anchor="middle" class="sub">+ environment</text>
  <text x="861" y="475" text-anchor="middle" class="sub">remote state in S3</text>
  <text x="861" y="493" text-anchor="middle" class="sub">sandbox / QA / prod</text>
  <text x="861" y="523" text-anchor="middle" class="sub">k6 load tests validate</text>
  <text x="861" y="541" text-anchor="middle" class="sub">before the traffic peak</text>
</svg>
